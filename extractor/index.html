<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evitania Save Extractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #10141c;
    --border: #1e2a3a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7cfc00;
    --text: #c8d8e8;
    --muted: #5a6a7a;
    --success: #7cfc00;
    --warn: #ffd700;
    --error: #ff4455;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  h1 {
    font-family: var(--sans);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,212,255,0.05) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover::before,
  .drop-zone.drag-over::before { opacity: 1; }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: var(--accent);
    border-style: solid;
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(0.3);
  }

  .drop-label {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .drop-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  .path-hint {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    opacity: 0.7;
  }

  input[type="file"] { display: none; }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 12px;
    min-height: 44px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-dot.err { background: var(--error); box-shadow: 0 0 8px var(--error); }
  .status-dot.loading {
    background: var(--accent);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text { color: var(--text); }

  /* Results section */
  .results {
    margin-top: 32px;
    display: none;
    flex-direction: column;
    gap: 24px;
  }

  .results.visible { display: flex; }

  /* Character tabs */
  .char-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .char-tab {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .char-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .char-tab.active {
    border-color: var(--accent);
    background: rgba(0,212,255,0.1);
    color: var(--accent);
  }

  /* Section panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 20px;
    background: rgba(0,212,255,0.05);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .panel-body { padding: 20px; }

  /* Character info grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .info-item { }

  .info-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;

  .info-value.accent { color: var(--accent); }
  .info-value.accent2 { color: var(--accent2); }
  .info-value.accent3 { color: var(--accent3); }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(30,42,58,0.5);
    color: var(--text);
    vertical-align: top;
  }

  .data-table tr:last-child td { border-bottom: none; }

  .data-table tr:hover td {
    background: rgba(0,212,255,0.03);
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: normal;
  }

  .badge-class {
    background: rgba(255,107,53,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
  }

  .badge-tier {

    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.2);

  .badge-tier-2 { background: rgba(0,212,255,0.1); color: var(--accent); border-color: rgba(0,212,255,0.3); }
  .badge-tier-3 { background: rgba(180,100,255,0.1); color: #c87aff; border-color: rgba(180,100,255,0.3); }

    border-radius: 3px;

    font-size: 11px;
    color: var(--accent);

  .tag.boss { color: var(--accent2); border-color: rgba(255,107,53,0.3); background: rgba(255,107,53,0.08); }
  .tag.curio { color: #c87aff; border-color: rgba(180,100,255,0.3); background: rgba(180,100,255,0.08); }

  .export-bar {

    align-items: center;

    color: var(--accent);

    overflow-y: auto;
    white-space: pre;
    line-height: 1.6;

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .empty-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    padding: 20px 0;

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;

  .rates-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);

  .rate-card {
    background: rgba(0,0,0,0.3);

    font-weight: 700;
    color: var(--accent3);
    font-family: var(--mono);

  .rate-lbl {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;

  /* Stash items */
  .stash-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .stash-item {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 14px;
  }

  .stash-item-name {
    font-weight: 600;
    color: #fff;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .stash-item-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>

const CARD_KEY_MAP = {
  BossCrab: "The Crab",
  BlueDragon: "Maevath",
  "difficulty1-act1": "Act 1 Hard",
  "difficulty1-act2": "Act 2 Hard"
};

// XOR-255 decode
function decodeHex(hex) {
  if (hex.length % 2 !== 0) throw new Error("Odd-length hex string");
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2)
    bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16) ^ 255;
  return new TextDecoder("utf-8").decode(bytes);
}

function normalizeCardKey(k) {
  return CARD_KEY_MAP[k] || k;
}

function extractDefeatedBosses(visitedScenes) {
  const result = [];
  for (const [boss, scenes] of Object.entries(BOSS_SCENES)) {
    if (scenes.some(s => visitedScenes.includes(s))) result.push(boss);
  }
  return result;
}

function extractMaxZone(visitedScenes) {
  let best = "", bestScore = -1;
  for (const s of visitedScenes) {
    const m = s.match(/^(\d+)\.(\d+)$/);
    if (!m) continue;
    const act = parseInt(m[1]), zone = parseInt(m[2]);
    if (act >= 2 && zone === 0) continue;
    const score = act * 100 + zone;
    if (score > bestScore) { bestScore = score; best = s; }
  }
  return best;
}

function extractStash(raw) {
  const inv = raw.Inventory || {};
  const stash = Array.isArray(inv.stash) ? inv.stash : [];
  const items = [];
  for (const slot of stash) {
    if (!slot || !slot.itemGuid) continue;
    const hasDurability = Object.prototype.hasOwnProperty.call(slot, "Durability");
    items.push({
      guid: slot.itemGuid,
      name: GEAR_GUID_MAP[slot.itemGuid] || null,
      amount: slot.Amount ?? 0,
      level: slot.Level ?? 0,
      enhancementLevel: slot.EnhancementLevel ?? 0,
      ...(hasDurability ? { durability: slot.Durability ?? 0 } : {}),
      isGear: hasDurability
    });
  }
  return { items, slotsOpened: inv.stashSlotsOpened ?? 0 };
}

function extractEngineer(raw) {
  const eng = raw.Engineer;
  if (!eng) return null;
  const slots = Array.isArray(eng.Slots) ? eng.Slots : [];
  const enhancements = {};
  for (const [k, v] of Object.entries(raw.ProgressProfile?.Enhancements || {}))
    if (k.startsWith("engineer_")) enhancements[k] = v;
  return {
    slots: slots.map((s, i) => ({
      index: i,
      enabled: !!s?.Enabled,
      stalled: !!s?.Stalled,
      lastProduced: s?.LastProduced ?? 0,
      upgrades: { ...s?.Upgrades || {} }
    })),
    stockpile: { ...eng.Stockpile || {} },
    lastSelectedSlot: eng.LastSelectedSlot ?? 0,
    hasBeenOpened: !!eng.HasBeenOpened,
    enhancements
  };
}

function decodeSave(raw) {
  const heroes = raw.Heroes?.Heroes ?? [];
  const enhancements = raw.ProgressProfile?.Enhancements ?? {};
  const cards = raw.Currency?.cards ?? {};
  const pets = raw.Pets?.petSaveData ?? [];
  const gemRuneSlots = enhancements.GemshopRuneSlotUnlock || 0;

  // Rune system — global
  const runeSystem = raw.RuneSystem;
  const globalRuneSlots = [];
  const globalActiveRunewords = {};
  const globalEquippedRunes = [];
  const globalRuneInventory = {};

  if (runeSystem?.Rows) {
    for (const row of runeSystem.Rows) {
      const unlocked = (row.UnlockedSlots || 0) + (row.RowIndex === 0 ? gemRuneSlots : 0);
      globalRuneSlots[row.RowIndex] = unlocked;
      if (row.ActiveRunewordId)
        globalActiveRunewords[row.RowIndex] = RUNEWORD_GUID_MAP[row.ActiveRunewordId] || row.ActiveRunewordId;
      for (const rune of Object.values(row.SlottedRunes || {})) {
        if (!rune) continue;
        const name = RUNE_GUID_MAP[rune];
        if (name) globalEquippedRunes.push(name);
      }
    }
  }
  for (const slot of runeSystem?.Inventory?.SlotEntries ?? []) {
    if (!slot?.ItemId || !slot.Count) continue;
    const name = RUNE_GUID_MAP[slot.ItemId];
    if (name) globalRuneInventory[name] = (globalRuneInventory[name] || 0) + slot.Count;
  }
  const discoveredRunewords = (runeSystem?.CollectedRunewordIds ?? []).map(id => RUNEWORD_GUID_MAP[id] || id);

  // Curios — global
  const curioSystem = raw.CurioSystem;
  const equippedCurios = [];
  if (curioSystem?.EquippedSlots && Array.isArray(curioSystem.Inventory)) {
    const instanceMap = {};
    for (const c of curioSystem.Inventory)
      if (c?.InstanceId) instanceMap[c.InstanceId] = c;
    for (const instanceId of Object.values(curioSystem.EquippedSlots)) {
      const item = instanceMap[instanceId];
      if (!item) continue;
      const name = CURIO_GUID_MAP[item.DefinitionId];
      if (name) equippedCurios.push({ name, level: item.Level || 1, tier: item.Tier || 0 });
    }
  }

  // Shared upgrades
  const hunterUpgrades = {}, ashUpgrades = {}, sacrificeUpgrades = {};
  for (const [k, v] of Object.entries(enhancements)) {
    if (k.startsWith("LeBabka_")) hunterUpgrades[k] = v;
    else if (k.startsWith("ash_")) ashUpgrades[k] = v;
    else if (k.startsWith("act-2-sacrifice-") || k.startsWith("bonfire-sacrifice-"))
      sacrificeUpgrades[k] = v;
  }

  const stash = extractStash(raw);
  const engineer = extractEngineer(raw);

  // Normalised cards
  const normalizedCards = {};
  for (const [k, v] of Object.entries(cards)) {
    const key = normalizeCardKey(k);
    normalizedCards[key] = (normalizedCards[key] || 0) + (v || 0);
  }

  const SLOT_MAP = {
    Helmet: "helmet", Chest: "chest", Legs: "gloves",
    Boots: "boots", Belt: "belt", Amulet: "amulet",
    Ring: "ring", Weapon1: "weapon", Weapon2: "weapon2",
    Potion: "potion", Axe: "axe", Pickaxe: "pickaxe"
  };

  return heroes.map((hero, heroIdx) => {
    // Skills/levels
    const skills = {};
    for (const s of hero.skillModels ?? []) skills[s.ESkill] = s.currentLevel;

    // Talents & profession skills
    const talents = {}, professionSkills = {};
    for (const [k, v] of Object.entries(hero.Enhancements ?? {})) {
      if (k.startsWith("profession_")) professionSkills[k] = v;
      else if (k.startsWith("tt_") || k.startsWith("novice_") || k.startsWith("class_"))
        talents[k] = v;
    }

    // Gear
    const gear = {};
    for (const [slot, item] of Object.entries(hero.equipment ?? {})) {
      const normalSlot = SLOT_MAP[slot] || slot.toLowerCase();
      if (!item) { gear[normalSlot] = null; continue; }
      gear[normalSlot] = {
        guid: item.itemGuid,
        name: GEAR_GUID_MAP[item.itemGuid] || null,
        level: item.Level,
        enhancementLevel: item.EnhancementLevel
      };
    }

    // Offline rates
    const offline = hero.OfflineProgress ?? {};

    // Pet
    const petData = pets.find(p => p.characterId === heroIdx && p.petSlot === 0);
    const activePet = petData ? { name: petData.petName, level: petData.level, tier: petData.tier } : null;

    // Visited scenes
    const visited = hero.Progress?.visitedScenes ?? [];
    const defeatedBosses = extractDefeatedBosses(visited);
    const maxUnlockedZone = extractMaxZone(visited);

    return {
      name: hero.Name,
      class: CLASS_MAP[hero.HeroClass] ?? "starter",
      level: skills[0] ?? 1,
      miningLevel: skills[1] ?? 1,
      woodcuttingLevel: skills[2] ?? 1,
      currentZone: hero.Progress?.scene ?? "",
      actDifficulty: { ...hero.Progress?.ActDifficulty ?? {} },
      maxUnlockedZone,
      defeatedBosses,
      gear,
      talents,
      professionSkills,
      hunterUpgrades,
      ashUpgrades,
      sacrificeUpgrades,
      cards: normalizedCards,
      equippedRunes: [...globalEquippedRunes],
      runeInventory: { ...globalRuneInventory },
      runeSlots: {
        total: globalRuneSlots.reduce((a, b) => a + (b || 0), 0),
        byRow: [...globalRuneSlots]
      },
      runewords: {
        discovered: [...discoveredRunewords],
        active: { ...globalActiveRunewords }
      },
      equippedCurios: [...equippedCurios],
      stash,
      engineer,
      farmingRates: {
        killsPerHour: offline.KillsPerHour ?? 0,
        xpPerHour: offline.XpPerHour ?? 0,
        goldPerHour: offline.GoldPerHour ?? 0
      },
      activePet
    };
  });
}

let parsedData = null;
let currentChar = 0;

function setStatus(type, msg) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot ' + (type || '');
  text.textContent = msg;
}

async function processFile(file) {
  if (!file) return;
  setStatus('loading', `Reading ${file.name}…`);
  try {
    const text = await file.text();
    const decoded = decodeHex(text.trim());
    const rawJson = JSON.parse(decoded);
    parsedData = decodeSave(rawJson);
    setStatus('ok', `✓ Decoded ${file.name} — ${parsedData.length} character(s) found`);
    renderResults();
  } catch (e) {
    setStatus('err', `Error: ${e.message}`);
    console.error(e);
  }
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (typeof n === 'number') {
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return Math.round(n).toLocaleString();
  }
  return String(n);
}

function renderResults() {
  const results = document.getElementById('results');
  results.classList.add('visible');

  // Tabs
  const tabs = document.getElementById('charTabs');
  tabs.innerHTML = parsedData.map((c, i) =>
    `<button class="char-tab ${i === 0 ? 'active' : ''}" onclick="switchChar(${i})">
      ${c.name} <span class="badge badge-class">${c.class}</span>
    </button>`
  ).join('');

  renderChar(0);
}

function switchChar(idx) {
  currentChar = idx;
  document.querySelectorAll('.char-tab').forEach((t, i) =>
    t.classList.toggle('active', i === idx)
  );
  renderChar(idx);
}

function downloadJSON() {
  if (!parsedData) return;
  const blob = new Blob([JSON.stringify(parsedData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'evitania-save.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function copyJSON() {
  if (!parsedData) return;
  navigator.clipboard.writeText(JSON.stringify(parsedData, null, 2))
    .then(() => {
      const btn = event.target;
      btn.textContent = '✓ Copied!';
      btn.classList.add('success');
      setTimeout(() => { btn.textContent = '📋 Copy to Clipboard'; btn.classList.remove('success'); }, 2000);
    });
}

function togglePreview() {
  const preview = document.getElementById('jsonPreview');
  const btn = document.getElementById('togglePreviewBtn');
  const visible = preview.classList.toggle('visible');
  btn.textContent = visible ? '👁 Hide JSON Preview' : '👁 Show JSON Preview';
}

// ── Drop zone wiring ──
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => processFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  processFile(e.dataTransfer.files[0]);
});
</script>

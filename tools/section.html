<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        [v-cloak] { display: none; }
    </style>
</head>
<body>
<div id="app" class="tools-root" v-cloak>
    <div class="layout calc-view">
        <aside class="sidebar-left">
            <div class="item-nav-panel" v-if="calcEntries?.length">
                <button v-for="entry in calcEntries" :key="entry.id"
                        class="item-nav-btn calc-nav-btn"
                        :class="{ active: activeCalc === entry.id }"
                        @click="selectCalc(entry.id)">
                    <span class="item-nav-label">{{ entry.label }}</span>
                </button>
            </div>
        </aside>

        <main class="content-center">
            <engineering-planner-panel v-if="showEngineeringPlanner" :app="appRef"></engineering-planner-panel>
            <smith-calculator-panel v-if="showSmithCalculator" :app="appRef"></smith-calculator-panel>
        </main>
    </div>

    <div class="mobile-topbar" v-if="calcEntries?.length">
        <div class="mobile-bonus-wrap">
            <div class="bonus-select-box" :class="{ open: calcDropdownOpen }" @click="calcDropdownOpen = !calcDropdownOpen">
                <span class="bonus-select-label" :class="{ placeholder: !activeCalc }">
                    {{ activeCalc ? calcEntries.find(entry => entry.id === activeCalc)?.label : 'Select a calculator&hellip;' }}
                </span>
                <span class="bonus-select-chevron">&#9660;</span>
            </div>
            <div class="bonus-dropdown mobile-dropdown" :class="{ open: calcDropdownOpen }" @click.stop>
                <div class="bonus-options">
                    <div v-for="entry in calcEntries" :key="entry.id"
                         class="bonus-option item-type-option"
                         :class="{ selected: activeCalc === entry.id }"
                         @click="selectCalc(entry.id); calcDropdownOpen = false">
                        <span>{{ entry.label }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-item-browser mobile-panel">
        <engineering-planner-panel v-if="showEngineeringPlanner" :app="appRef"></engineering-planner-panel>
        <smith-calculator-panel v-if="showSmithCalculator" :app="appRef"></smith-calculator-panel>
    </div>
</div>
</body>
</html>

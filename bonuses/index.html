<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Evitania — Bonus Sources</title>
    <link rel="stylesheet" href="style.css?v=1">
    <style>
        [v-cloak] { display: none; }
        @media (min-width: 901px) {
            .mobile-drawer, .mobile-drawer-overlay, .mobile-topbar, .mobile-tabbar, .mobile-scroll-container { display: none; }
        }
    </style>
</head>
<body>
<div id="app" v-cloak>

    <!-- DESKTOP LAYOUT -->
    <div class="layout">
        <aside class="sidebar-left">
            <!-- Bonus dropdown -->
            <div class="bonus-select-wrap">
                <div class="bonus-select-box" :class="{ open: dropdownOpen }" @click="dropdownOpen = !dropdownOpen">
                    <span class="bonus-select-label" :class="{ placeholder: !selectedBonus }">
                        {{ selectedBonus ? bonusLabel(selectedBonus) : 'Select a bonus…' }}
                    </span>
                    <span class="bonus-select-chevron">▼</span>
                </div>
                <div class="bonus-dropdown" :class="{ open: dropdownOpen }" @click.stop>
                    <div class="bonus-search-wrap">
                        <input class="bonus-search" type="search" placeholder="Search bonuses…"
                               autocomplete="off" spellcheck="false"
                               v-model="bonusSearch"
                               ref="bonusSearchInput">
                    </div>
                    <div class="bonus-options">
                        <div v-for="bt in filteredBonusTypes" :key="bt.id"
                             class="bonus-option" :class="{ selected: selectedBonus === bt.id }"
                             @click="selectBonus(bt.id); dropdownOpen = false">
                            {{ bt.label }}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Class + stats -->
            <div class="class-level-wrap">
                <div class="class-switcher" v-if="data?.classes?.length">
                    <button v-for="cls in data.classes" :key="cls.id"
                            class="class-btn"
                            :class="{ active: selectedClass === cls.id }"
                            :style="selectedClass === cls.id ? { background: cls.color, color: '#1a1400' } : {}"
                            @click="selectedClass = cls.id; syncUrl()">
                        {{ cls.label }}
                    </button>
                </div>
                <div class="stat-inputs-wrap" v-if="parameters.length">
                    <div v-for="parameter in parameters" class="level-input-wrap">
                        <label class="level-label">{{ parameter.label }}</label>
                        <input class="level-input" type="number" :min="parameter.min ?? 0" :max="parameter.max"
                               v-model.number="parameter.value" @change="syncUrl()" @focus="e => e.target.select()">
                    </div>
                </div>
            </div>

            <!-- Conditions panel -->
            <div class="condition-panel" v-if="data?.conditions?.length">
                <div class="condition-header" @click="conditionPanelOpen = !conditionPanelOpen">
                    Conditions
                    <span class="section-chev" :class="{ collapsed: !conditionPanelOpen }">▼</span>
                </div>
                <div class="condition-body" v-show="conditionPanelOpen">
                    <label v-for="cond in data.conditions" :key="cond.id" class="condition-row">
                        <input type="checkbox"
                               :checked="activeConditions.has(cond.id)"
                               @change="toggleCondition(cond.id); syncUrl()">
                        <span>{{ cond.label }}</span>
                    </label>
                </div>
            </div>
            <a class="report-btn" :href="reportUrl" target="_blank">Report Issue</a>
        </aside>

        <main class="content-center">
            <empty-state :selected-bonus="selectedBonus"></empty-state>

            <template v-if="selectedBonus">
                <div v-for="[type, typeDef] in visibleTypes" :key="type"
                     class="source-section"
                     :data-type="type"
                     :style="{ '--section-color': typeDef.tag_style.color }">

                    <div class="section-header" @click="toggleSection(type)">
                        <span>{{ typeDef.label }}</span>
                        <span class="section-chev" :class="{ collapsed: collapsedSections.has(type) }">▼</span>
                    </div>

                    <div v-show="!collapsedSections.has(type)" class="source-columns">
                        <div>
                            <source-row
                                    v-for="entry in columnEntries(type, 0)" :key="entry.src.id"
                                    :entry="entry"
                                    :selected-bonus="selectedBonus"
                                    :open-details="openDetails"
                                    :app="appRef"
                                    @toggle-detail="toggleDetail">
                            </source-row>
                        </div>
                        <div>
                            <source-row
                                    v-for="entry in columnEntries(type, 1)" :key="entry.src.id"
                                    :entry="entry"
                                    :selected-bonus="selectedBonus"
                                    :open-details="openDetails"
                                    :app="appRef"
                                    @toggle-detail="toggleDetail">
                            </source-row>
                        </div>
                    </div>
                </div>
            </template>
        </main>

        <aside class="sidebar-right">
            <div class="max-panel" v-if="selectedBonus">
                <max-panel
                        :max-items="maxItems"
                        :max-result="maxResult"
                        :max-tab="maxTab"
                        :app="appRef"
                        @update-tab="t => maxTab = t">
                </max-panel>
            </div>
        </aside>
    </div>

    <!-- MOBILE TOP BAR -->
    <div class="mobile-topbar" v-if="data">
        <div class="mobile-bonus-wrap">
            <div class="bonus-select-box" :class="{ open: dropdownOpen }" @click="dropdownOpen = !dropdownOpen">
                <span class="bonus-select-label" :class="{ placeholder: !selectedBonus }">
                    {{ selectedBonus ? bonusLabel(selectedBonus) : 'Select a bonus…' }}
                </span>
                <span class="bonus-select-chevron">▼</span>
            </div>
            <div class="bonus-dropdown" :class="{ open: dropdownOpen }" @click.stop>
                <div class="bonus-search-wrap">
                    <input class="bonus-search" type="search" placeholder="Search bonuses…"
                           autocomplete="off" spellcheck="false"
                           v-model="bonusSearch"
                           ref="bonusSearchInputMobile">
                </div>
                <div class="bonus-options">
                    <div v-for="bt in filteredBonusTypes" :key="bt.id"
                         class="bonus-option" :class="{ selected: selectedBonus === bt.id }"
                         @click="selectBonus(bt.id); dropdownOpen = false">
                        {{ bt.label }}
                    </div>
                </div>
            </div>
        </div>
        <button class="mobile-settings-btn" @click="mobileSettingsOpen = true">⚙</button>
    </div>

    <!-- MOBILE SCROLL PANELS -->
    <div class="mobile-scroll-container" ref="mobileScroll">
        <main class="content-center mobile-panel">
            <empty-state :selected-bonus="selectedBonus"></empty-state>

            <template v-if="selectedBonus">
                <div v-for="[type, typeDef] in visibleTypes" :key="type"
                     class="source-section"
                     :data-type="type"
                     :style="{ '--section-color': typeDef.tag_style.color }">

                    <div class="section-header" @click="toggleSection(type)">
                        <span>{{ typeDef.label }}</span>
                        <span class="section-chev" :class="{ collapsed: collapsedSections.has(type) }">▼</span>
                    </div>

                    <div v-show="!collapsedSections.has(type)" class="source-columns">
                        <div>
                            <source-row
                                    v-for="entry in columnEntries(type, 0)" :key="entry.src.id"
                                    :entry="entry"
                                    :selected-bonus="selectedBonus"
                                    :open-details="openDetails"
                                    :app="appRef"
                                    @toggle-detail="toggleDetail">
                            </source-row>
                        </div>
                        <div>
                            <source-row
                                    v-for="entry in columnEntries(type, 1)" :key="entry.src.id"
                                    :entry="entry"
                                    :selected-bonus="selectedBonus"
                                    :open-details="openDetails"
                                    :app="appRef"
                                    @toggle-detail="toggleDetail">
                            </source-row>
                        </div>
                    </div>
                </div>
            </template>
        </main>

        <div class="mobile-max-panel mobile-panel">
            <empty-state :selected-bonus="selectedBonus"></empty-state>
            <div class="max-panel" v-if="selectedBonus">
                <max-panel :max-items="maxItems" :max-result="maxResult" :max-tab="'avail'" :app="appRef"
                           :show-tab-switcher="false" @update-tab="t => maxTab = t"></max-panel>
            </div>
        </div>

        <div class="mobile-max-panel mobile-panel">
            <empty-state :selected-bonus="selectedBonus"></empty-state>
            <div class="max-panel" v-if="selectedBonus">
                <max-panel :max-items="maxItems" :max-result="maxResult" :max-tab="'all'" :app="appRef"
                           :show-tab-switcher="false" @update-tab="t => maxTab = t"></max-panel>
            </div>
        </div>
    </div>

    <!-- MOBILE TAB BAR -->
    <div class="mobile-tabbar" v-if="data">
        <button class="mobile-tab" :class="{ active: mobileTab === 'sources' }" @click="setMobileTab('sources')">
            <span class="mobile-tab-icon">◈</span>
            <span>Sources</span>
        </button>
        <button class="mobile-tab" :class="{ active: mobileTab === 'avail' }" @click="setMobileTab('avail')">
            <span class="mobile-tab-icon">Σ</span>
            <span>Max (Avail)</span>
        </button>
        <button class="mobile-tab" :class="{ active: mobileTab === 'all' }" @click="setMobileTab('all')">
            <span class="mobile-tab-icon">Σ</span>
            <span>Max (All)</span>
        </button>
    </div>

    <!-- MOBILE SETTINGS SHEET -->
    <div class="mobile-drawer-overlay" :class="{ open: mobileSettingsOpen }" @click="mobileSettingsOpen = false"></div>
    <div class="mobile-drawer" :class="{ open: mobileSettingsOpen }">
        <div class="mobile-drawer-handle"></div>
        <div class="class-switcher" v-if="data?.classes?.length">
            <button v-for="cls in data.classes" :key="cls.id"
                    class="class-btn"
                    :class="{ active: selectedClass === cls.id }"
                    :style="selectedClass === cls.id ? { background: cls.color, color: '#1a1400' } : {}"
                    @click="selectedClass = cls.id; syncUrl()">
                {{ cls.label }}
            </button>
        </div>
        <div class="stat-inputs-wrap" v-if="parameters.length">
            <div v-for="parameter in parameters" class="level-input-wrap">
                <label class="level-label">{{ parameter.label }}</label>
                <input class="level-input" type="number" :min="parameter.min ?? 0" :max="parameter.max"
                       v-model.number="parameter.value" @change="syncUrl()" @focus="e => e.target.select()">
            </div>
        </div>
        <div class="condition-panel" v-if="data?.conditions?.length">
            <div class="condition-header" @click="conditionPanelOpen = !conditionPanelOpen">
                Conditions
                <span class="section-chev" :class="{ collapsed: !conditionPanelOpen }">▼</span>
            </div>
            <div class="condition-body" v-show="conditionPanelOpen">
                <label v-for="cond in data.conditions" :key="cond.id" class="condition-row">
                    <input type="checkbox"
                           :checked="activeConditions.has(cond.id)"
                           @change="toggleCondition(cond.id); syncUrl()">
                    <span>{{ cond.label }}</span>
                </label>
            </div>
        </div>
        <a class="mobile-drawer-report" :href="reportUrl" target="_blank">Report an Issue</a>
    </div>

    <teleport to="body">
        <div id="popover" class="popover" v-if="popoverEntry" @click.stop>
            <div class="popover-header">
                <span>{{ data.types[popoverEntry.type].label }}</span>
                <button class="popover-close" @click="closePopover()">✕</button>
            </div>
            <source-row
                    :entry="popoverEntry.entry"
                    :selected-bonus="selectedBonus"
                    :open-details="popoverOpenDetails"
                    :app="appRef"
                    @toggle-detail="togglePopoverDetail">
            </source-row>
        </div>
    </teleport>

    <teleport to="body">
        <div v-if="tooltipVisible" class="bd-tooltip-global"
             :style="{ left: tooltipX + 'px', top: tooltipY + 'px' }">
            {{ tooltipText }}
        </div>
    </teleport>
</div>

<script type="importmap">
    {
        "imports": {
            "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.prod.js"
        }
    }
</script>
<script type="module" src="app.js?v=3"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Hint</title>
    <style>
        body {
            background: #1a1530;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        button {
            background: #c8a020;
            color: #1a1530;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
<button onclick="localStorage.removeItem('cycle_hint_seen'); alert('Done! Hint will show again.')">
    Reset cycle hint
</button>
</body>
</html>
